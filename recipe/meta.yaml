{% set name = "notebook-as-pdf" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/notebook-as-pdf-{{ version }}.tar.gz
  sha256: c0d90c48d9f42f6dd4c16db5b7c54a6553ec8948a98539d7d06d54501b0fae85

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - nbconvert
    - pyppeteer
    - pypdf2

test:
  imports:
    - notebook_as_pdf
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/betatim/notebook-as-pdf
  summary: Jupyter extension to export notebooks as PDFs
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - opoplawski
